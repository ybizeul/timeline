apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeline-server
  namespace: timeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: timeline-server
  template:
    metadata:
      labels:
        app: timeline-server
    spec:
      containers:
        - name: timeline-server
          image: timeline-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: timeline-server-config
            - secretRef:
                name: timeline-server-secrets
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
