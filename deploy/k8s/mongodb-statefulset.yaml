apiVersion: v1
kind: Service
metadata:
  name: timeline-mongodb
  namespace: timeline
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: timeline-mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timeline-mongodb
  namespace: timeline
spec:
  serviceName: timeline-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: timeline-mongodb
  template:
    metadata:
      labels:
        app: timeline-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
